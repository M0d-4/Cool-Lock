name: Build & Release

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle/libs.versions.toml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag for the release (e.g. v1.3.0)'
        required: true
        type: string

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "${{ inputs.version_tag }}" | grep -q "${{ inputs.version_tag }}"; then
            echo "Tag ${{ inputs.version_tag }} already exists on remote, reusing it."
          else
            git tag "${{ inputs.version_tag }}"
            git push origin "${{ inputs.version_tag }}"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign release APK
        if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_SDK_ROOT/build-tools/"* | sort -V | tail -1)
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          "$ZIPALIGN" -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          rm keystore.jks

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cool-Lock-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cool-Lock-release-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

  # Beta release: triggered automatically on push when source files change
  beta_release:
    name: Publish Beta Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Cool-Lock-release-${{ github.sha }}
          path: apk/release

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Cool-Lock-debug-${{ github.sha }}
          path: apk/debug

      - name: Determine beta tag
        id: beta_tag
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "name=beta-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Delete existing beta tag/release if present
        run: |
          TAG="${{ steps.beta_tag.outputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename APKs with beta tag
        run: |
          TAG="${{ steps.beta_tag.outputs.name }}"
          mv apk/release/app-release-signed.apk apk/release/Cool-Lock-${TAG}.apk 2>/dev/null || \
          mv apk/release/app-release-unsigned.apk apk/release/Cool-Lock-${TAG}.apk
          mv apk/debug/app-debug.apk apk/debug/Cool-Lock-${TAG}-debug.apk

      - name: Create Beta GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.beta_tag.outputs.name }}
          name: "Cool-Lock Beta (${{ steps.beta_tag.outputs.name }})"
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            Beta build - automatically published on source change.
            Commit: ${{ github.sha }}
          files: |
            apk/release/Cool-Lock-${{ steps.beta_tag.outputs.name }}.apk
            apk/debug/Cool-Lock-${{ steps.beta_tag.outputs.name }}-debug.apk

  # Stable release: triggered only via manual workflow_dispatch
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Cool-Lock-release-${{ github.sha }}
          path: apk/release

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Cool-Lock-debug-${{ github.sha }}
          path: apk/debug

      - name: Rename APKs with version
        run: |
          TAG="${{ inputs.version_tag }}"
          mv apk/release/app-release-signed.apk   apk/release/Cool-Lock-${TAG}.apk 2>/dev/null || \
          mv apk/release/app-release-unsigned.apk apk/release/Cool-Lock-${TAG}.apk
          mv apk/debug/app-debug.apk              apk/debug/Cool-Lock-${TAG}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: Cool-Lock ${{ inputs.version_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            apk/release/Cool-Lock-${{ inputs.version_tag }}.apk
            apk/debug/Cool-Lock-${{ inputs.version_tag }}-debug.apk
