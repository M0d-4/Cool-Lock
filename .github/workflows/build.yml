name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with this version tag?'
        required: true
        type: boolean
        default: false
      version_tag:
        description: 'Version tag to create (e.g. v1.3.0) — only used if Create Release is checked'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == true && inputs.version_tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "${{ inputs.version_tag }}" | grep -q "${{ inputs.version_tag }}"; then
            echo "Tag ${{ inputs.version_tag }} already exists on remote, reusing it."
          else
            git tag "${{ inputs.version_tag }}"
            git push origin "${{ inputs.version_tag }}"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign release APK
        if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_SDK_ROOT/build-tools/"* | sort -V | tail -1)
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          "$ZIPALIGN" -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          rm keystore.jks

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cool-Lock-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cool-Lock-release-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == true && inputs.version_tag != '')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Cool-Lock-release-${{ github.sha }}
          path: apk/release

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Cool-Lock-debug-${{ github.sha }}
          path: apk/debug

      - name: Rename APKs with version
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          mv apk/release/app-release-signed.apk   apk/release/Cool-Lock-${TAG}.apk
          mv apk/debug/app-debug.apk              apk/debug/Cool-Lock-${TAG}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Cool-Lock ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            apk/release/Cool-Lock-${{ steps.tag.outputs.name }}.apk
            apk/debug/Cool-Lock-${{ steps.tag.outputs.name }}-debug.apk
